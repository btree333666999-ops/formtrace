<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <title>FormTrace</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Pencil: drawn horizontally then rotated 45° CCW so tip is bottom-left, eraser top-right -->
  <g transform="rotate(-45 16 16)">
    <!-- Graphite tip -->
    <polygon points="3,16 8,13 8,19" fill="#cbd5e1"/>
    <!-- Wood cone -->
    <rect x="8" y="13" width="4" height="6" fill="#c07a2a"/>
    <!-- Body (bold amber) -->
    <rect x="12" y="12" width="12" height="8" fill="#fbbf24"/>
    <!-- Ferrule (metal band) -->
    <rect x="24" y="12" width="2" height="8" fill="#94a3b8"/>
    <!-- Eraser -->
    <rect x="26" y="12" width="4" height="8" rx="1" fill="#fb7185"/>
  </g>
</svg>
